# /etc/nginx/sites-available/senddrive
# Symlink to enable: ln -s /etc/nginx/sites-available/senddrive /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name senddrive.bcim.in;

    # Redirect all HTTP → HTTPS once SSL is set up
    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow large file uploads (up to 2 GB)
        client_max_body_size 2100m;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
        proxy_connect_timeout 75s;
    }
}

